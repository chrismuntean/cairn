# Cairn sensor registry.
#
# Sensors are mechanical checks run against an agent's diff.
# Listed here are the GENERIC kinds that ship with the Cairn package. Stack
# profiles propose profile-specific sensors at adoption; the operator confirms
# each one. Project-specific sensors live in the adopting project's extension
# block (see workflow.md).
#
# Cairn package code does NOT hardcode any specific project's sensor names.
# All concrete sensor identifiers below are stack-profile-agnostic primitives.

version: 1

# ──────────────────────────────────────────────────────────────────────────────
# Generic (stack-profile-agnostic) sensors.
# ──────────────────────────────────────────────────────────────────────────────

sensors:

  # ── Layer A — mechanical stub catalog ─────────────────────────────────────
  - id: stub-pattern-catalog
    layer: A
    kind: regex_catalog
    description: "Mechanical scan of diff against .cairn/config/stub-patterns.yaml."
    catalog: .cairn/config/stub-patterns.yaml
    triggers:
      - every_run
    fail_severity: hard

  # ── Decision-assertion sensor ─────────────────────────────────────────────
  - id: decision-assertions
    layer: decisions
    kind: assertion_evaluator
    description: "For every accepted decision whose scope_globs overlap the diff, evaluate machine-readable assertions (schema_must_contain, text_must_*, index_must_exist, ast_pattern, file_must_not_be_modified, query_must_filter_by, route_must_have_guard, event_must_emit, service_method_must_call, human_review_hint). Failure quotes the assertion id + decision id + the contradicting line."
    triggers:
      - every_run
    fail_severity: hard

  # ── §INV invariant sensors ───────────────────────────────────────────────
  # PLANNED — not yet wired. No runner reads this entry: the pre-commit sweep
  # executes only stub-pattern-catalog + decision-assertions. Invariants are
  # curated (§INV pillar) but enforcement (an assertions[] array on each
  # invariant routed through the assertion evaluator, like decisions) is a
  # gap, not a live gate. Kept `soft` so it reads as a roadmap item, NOT a
  # hard gate that silently passes because nothing runs it.
  - id: invariant-suite
    layer: invariants
    kind: invariant_runner
    status: planned
    description: "PLANNED (not wired): would run every active §INV invariant's linked assertion. Today no runner reads this; invariant enforcement is unimplemented."
    triggers:
      - every_run
    sources:
      - .cairn/ground/invariants/
    fail_severity: soft

  # ── Frontmatter freshness (nightly GC pass) ──────────────────────────────
  - id: frontmatter-freshness
    layer: gc
    kind: frontmatter_check
    description: "Walks load-bearing markdown in canonical zone. Flags files with verified-at older than 30 days; blocks reads via hook on > 60 days."
    triggers:
      - nightly_cron
    fail_severity: soft

  # ── Local-dirty-overlap gate ──────────────────────────────────────────────
  - id: local-dirty-overlap
    layer: pre_dispatch
    kind: working_tree_check
    description: "Before dispatch AND before push, check user's working tree for un-pushed dirty files that overlap the run's target_path_globs. If overlap, pause run and offer A/B/C resolution (stash / cancel / wait)."
    triggers:
      - pre_dispatch
      - pre_push
    fail_severity: soft

# ──────────────────────────────────────────────────────────────────────────────
# Copy-safety configuration (write guardian + copy scanner)
#
# The write guardian and the copy scanner (both PostToolUse hooks on
# Write/Edit) consume this block. Globs default to common frontend
# file extensions; extend per-project as needed. allowlist holds verbatim
# strings that match a pattern but are intentional (technical error codes,
# product names, etc.).
# ──────────────────────────────────────────────────────────────────────────────

copy_safety:
  enabled: true
  globs:
    - "src/**/*.tsx"
    - "src/**/*.jsx"
    - "src/**/*.vue"
    - "src/**/*.svelte"
    - "**/*.html"
    - "src/**/i18n/**/*.json"
    - "src/**/locales/**/*.json"
  allowlist: []

# ──────────────────────────────────────────────────────────────────────────────
# Disable list — sensors known to false-positive at >50% on a given project.
# Default empty; populated per-project via the attention flow.
# ──────────────────────────────────────────────────────────────────────────────

disabled_per_project: []
