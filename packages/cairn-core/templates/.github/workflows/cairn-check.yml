name: cairn-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  cairn:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cairn CLI
        run: npm install -g @isaacriehm/cairn

      - name: Cairn doctor — verify ground state is healthy
        run: cairn doctor
