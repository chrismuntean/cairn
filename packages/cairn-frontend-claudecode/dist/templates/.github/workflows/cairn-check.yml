name: cairn-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  cairn:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cairn CLI
        run: npm install -g @isaacriehm/cairn

      - name: Cairn doctor — verify ground state is healthy
        run: cairn doctor

      - name: Cairn sensor sweep — enforce decisions/invariants on the diff
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="origin/${{ github.event.repository.default_branch || 'main' }}"
          fi
          cairn sensor-run --diff "${BASE}..HEAD" --strict
