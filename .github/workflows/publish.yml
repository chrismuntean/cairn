name: publish

# Triggered by every `vX.Y.Z` tag push. Four deliverables:
#   1. @isaacriehm/cairn-state → npm  (transitive dep of core; must publish first)
#   2. @isaacriehm/cairn-core → npm
#   3. @isaacriehm/cairn → npm
#   4. cairn-lens-X.Y.Z.vsix → GitHub Release (with auto-generated notes)
#
# Bump the package versions, push the tag — releases happen automatically.
#
# Auth: npm OIDC trusted publishing — no NPM_TOKEN secret. The `id-token:
# write` permission below lets pnpm exchange a GitHub OIDC token for a
# short-lived npm credential at publish time. Each package
# (@isaacriehm/cairn-state, -core, and the umbrella cairn) must have a trusted
# publisher configured on npmjs.com pointing at THIS repo + workflow file
# (.github/workflows/publish.yml). New packages need their trusted-publisher
# entry added before their first release.
#
# Note: `actions/setup-node` is intentionally NOT given `registry-url` — that
# writes an .npmrc with a `${NODE_AUTH_TOKEN}` placeholder which, with no token
# present, breaks pnpm's OIDC exchange (404). pnpm publishes to the default
# registry and does the token exchange itself.
#
# Uses the built-in GITHUB_TOKEN for GitHub Release creation; no extra
# secret required.

on:
  push:
    tags:
      - "v*"
  # Manual retrigger path. GitHub silently drops tag-push workflow
  # events when many tags are pushed in a single `git push` (we hit
  # this with v0.11.1 → v0.11.9 — only the first tag fired). Use
  # `gh workflow run publish.yml -f tag=v0.11.5` (or the Actions UI)
  # to re-fire publish for any tag that missed its automatic run.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.11.5)"
        required: true
        type: string

permissions:
  contents: write    # required to create GitHub Releases
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      # No registry-url — see header note: it writes a token-placeholder
      # .npmrc that breaks pnpm's OIDC exchange.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # Trusted publishing needs npm CLI >= 11.5.1 (+ Node >= 22.14). Node 22
      # ships npm ~10.9, and pnpm's OIDC token exchange relies on this newer
      # npm — without the upgrade `pnpm publish` bails with ENEEDAUTH and never
      # attempts OIDC. (pnpm 10.x does OIDC; the regression was pnpm 11.0.x.)
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version sync gate
        run: pnpm version:check

      - name: Build
        run: pnpm -r build

      # Trusted publishing: no NODE_AUTH_TOKEN. pnpm performs the OIDC token
      # exchange using the `id-token: write` permission. Order is dependency
      # order — state before core before the umbrella.
      - name: Publish cairn-state
        run: pnpm publish --filter @isaacriehm/cairn-state --access public --no-git-checks

      - name: Publish cairn-core
        run: pnpm publish --filter @isaacriehm/cairn-core --access public --no-git-checks

      - name: Publish cairn
        run: pnpm publish --filter @isaacriehm/cairn --access public --no-git-checks

  release-vsix:
    name: Build + release vsix
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core (prerequisite for lens bundle)
        run: pnpm -r build

      - name: Package vsix
        working-directory: packages/cairn-lens
        run: pnpm package

      - name: Locate vsix
        id: vsix
        working-directory: packages/cairn-lens
        run: echo "path=$(ls *.vsix | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cairn ${{ github.event.inputs.tag || github.ref_name }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: packages/cairn-lens/${{ steps.vsix.outputs.path }}
          body: |
            Cairn ${{ github.ref_name }}.

            ## Installs

            - **Claude Code plugin** (recommended): `/plugin marketplace add isaacriehm/cairn` then `/plugin install cairn@isaacriehm-cairn`
            - **CLI**: `npm install -g @isaacriehm/cairn`
            - **Library**: `npm install @isaacriehm/cairn-core`
            - **Editor extension** (Cairn Lens): download the `.vsix` below
              and install via `Cmd/Ctrl+Shift+P` → `Extensions: Install from VSIX…`.
